name: FB-Bot-Runner

on:
  push:
    branches: [ main ]
  workflow_dispatch: # যাতে আপনি নিজে 'Run workflow' বাটন টিপে স্টার্ট দিতে পারেন

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20' # লেটেস্ট ভার্সন যাতে ওয়ার্নিং না আসে

    - name: Install Dependencies
      run: |
        npm install fca-project-orion fs-extra express

    - name: Run Bot
      run: node index.js
      env:
        CI: true
