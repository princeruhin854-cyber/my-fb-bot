name: Facebook Chatbot Runner

on:
  workflow_dispatch: # এই লাইনের ফলে তুমি GitHub থেকে ম্যানুয়ালি বট চালু করতে পারবে
  schedule:
    - cron: '0 */5 * * *' # প্রতি ৫ ঘণ্টা পর পর বট রিস্টার্ট নিবে (কারণ GitHub Action ৬ ঘণ্টার বেশি একটানা চলে না)

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      # ১. তোমার রিপোজিটরি থেকে কোড আনবে
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ২. Node.js সেটআপ করবে (ভার্সন ১৮)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ৩. package.json থেকে প্রয়োজনীয় লাইব্রেরি ইনস্টল করবে
      - name: Install Dependencies
        run: npm install

      # ৪. বট
