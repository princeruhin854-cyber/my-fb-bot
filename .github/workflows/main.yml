name: Facebook Chatbot Runner

on:
  workflow_dispatch: 
  schedule:
    - cron: '0 */5 * * *' 

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # এখানে Node.js এর ভার্সন 16 করে দেওয়া হয়েছে
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'

      # ক্যাশ ক্লিয়ার করে এবং ফোর্স ইনস্টল করার কমান্ড দেওয়া হয়েছে
      - name: Install Dependencies
        run: |
          npm cache clean --force
          npm install --legacy-peer-deps

      - name: Start the Bot
        env:
          APPSTATE: ${{ secrets.APPSTATE }}
        run: node index.js
